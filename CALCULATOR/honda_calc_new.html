<script>
function updateData() {
  const select = document.getElementById('hondaModel');
  const option = select.options[select.selectedIndex];
  const price = parseFloat(option.value);
  const promoRebate = parseFloat(option.getAttribute('data-rebate')) || 0;

  document.getElementById('sumInsured').value = Math.ceil(price / 1000) * 1000;
  document.getElementById('downpayment').value = Math.round(price * 0.10); 
  document.getElementById('rebate').value = promoRebate;
  calculate();
}

function calculate() {
  const select = document.getElementById('hondaModel');
  const option = select.options[select.selectedIndex];
  const price = parseFloat(option.value);
  const cc = parseInt(option.getAttribute('data-cc'));
  
  const sumInsured = parseFloat(document.getElementById('sumInsured').value) || price;
  const ncd = parseFloat(document.getElementById('ncd').value) / 100;
  const dp = parseFloat(document.getElementById('downpayment').value) || 0;
  const rebate = parseFloat(document.getElementById('rebate').value) || 0;
  const interest = parseFloat(document.getElementById('interest').value) / 100;
  const tenureYears = parseInt(document.getElementById('tenure').value);

  // 1. Insurance Calculation Logic
  let baseRate = 305.50; // Tariff for 1401cc - 1650cc
  if (cc > 1650) baseRate = 339.10; // Tariff for 1651cc - 2200cc
  
  const additionalSum = (sumInsured - 1000) / 1000;
  const basicPremium = baseRate + (additionalSum * 26);
  const finalPremium = ((basicPremium * (1 - ncd)) * 1.08) + 10;
  
  document.getElementById('insResult').innerText = "RM " + Math.round(finalPremium).toLocaleString();
  
  // 2. Installment Logic
  const totalFinanced = (price + finalPremium) - dp - rebate;
  document.getElementById('totalBodyIns').innerText = "RM " + Math.round(totalFinanced).toLocaleString();
  document.getElementById('monthlyLabel').innerText = "Monthly Installment (" + tenureYears + " Years)";

  if (totalFinanced > 0) {
    const totalInt = totalFinanced * interest * tenureYears;
    const monthly = (totalFinanced + totalInt) / (tenureYears * 12);
    document.getElementById('monthlyResult').innerText = "RM " + Math.round(monthly).toLocaleString();
    
    // NCD Savings Display
    const zeroNcdPremium = (basicPremium * 1.08) + 10;
    const savingPerMonth = (zeroNcdPremium - finalPremium) / (tenureYears * 12);
    
    if (ncd > 0) {
        document.getElementById('savingNote').innerText = (ncd*100).toFixed(0) + "% NCD saves RM " + Math.round(savingPerMonth) + " on monthly installments.";
    } else {
        document.getElementById('savingNote').innerText = "0% NCD: No installment reduction applied.";
    }
  } else {
    document.getElementById('monthlyResult').innerText = "RM 0";
    document.getElementById('savingNote').innerText = "";
  }
}
updateData();
</script>
